<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Node Game — Project Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  :root {
    --blue: #44aaff;
    --blue-dim: #1a3a5c;
    --red: #ff4455;
    --bg: #080c14;
    --panel: #0d1422;
    --border: #1a2a44;
    --text: #aaccff;
    --muted: #446688;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    padding: 32px 24px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, var(--border) 40px, var(--border) 40px);
    background-size: 40px 40px;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    color: var(--blue);
    font-size: 1.6rem;
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 0 0 20px var(--blue);
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-bottom: 40px;
    letter-spacing: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto 40px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--blue-dim);
    transition: background 0.2s;
  }
  .card:hover { border-color: var(--blue); box-shadow: 0 0 20px rgba(68,170,255,0.12); transform: translateY(-2px); }
  .card:hover::before { background: var(--blue); }
  .card.active { border-color: var(--blue); box-shadow: 0 0 28px rgba(68,170,255,0.2); }
  .card.active::before { background: var(--blue); }

  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .icon { font-size: 1.4rem; }
  .card-title { font-family: 'Orbitron', monospace; font-size: 0.75rem; color: var(--blue); letter-spacing: 2px; text-transform: uppercase; }
  .card-file { font-size: 0.72rem; color: var(--muted); margin-bottom: 10px; padding: 4px 8px; background: rgba(68,170,255,0.04); border-radius: 2px; border-left: 2px solid var(--blue-dim); }
  .card-lines { font-size: 0.65rem; color: #2a4a6a; margin-bottom: 8px; }
  .card-desc { font-size: 0.75rem; color: #7a9aba; line-height: 1.6; }

  .detail {
    max-width: 1200px;
    margin: 0 auto 40px;
    background: var(--panel);
    border: 1px solid var(--blue);
    border-radius: 4px;
    padding: 24px;
    display: none;
    animation: fadeIn 0.2s ease;
  }
  .detail.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .detail-title { font-family: 'Orbitron', monospace; color: var(--blue); font-size: 0.9rem; letter-spacing: 3px; margin-bottom: 16px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .detail-section h3 { font-size: 0.7rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag { padding: 3px 10px; border-radius: 2px; font-size: 0.7rem; border: 1px solid; }
  .tag.blue   { color: var(--blue); border-color: var(--blue-dim); background: rgba(68,170,255,0.06); }
  .tag.red    { color: var(--red);  border-color: #5c1a1a;         background: rgba(255,68,85,0.06); }
  .tag.yellow { color: #ffcc44;     border-color: #5c4a00;         background: rgba(255,204,68,0.06); }
  .tag.green  { color: #44ff88;     border-color: #1a5c35;         background: rgba(68,255,136,0.06); }
  .step-list { list-style: none; }
  .step-list li { padding: 6px 0; font-size: 0.75rem; color: #7a9aba; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
  .step-list li span.num { color: var(--blue); min-width: 20px; }

  .pipeline {
    max-width: 1200px;
    margin: 0 auto 40px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
  }
  .pipeline-title { font-family: 'Orbitron', monospace; color: var(--blue); font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 20px; text-align: center; }
  .pipeline-flow { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 0; }
  .pipe-step { text-align: center; padding: 14px 20px; background: rgba(68,170,255,0.04); border: 1px solid var(--blue-dim); border-radius: 3px; min-width: 120px; }
  .pipe-step .p-icon { font-size: 1.4rem; margin-bottom: 6px; }
  .pipe-step .p-name { font-size: 0.65rem; color: var(--blue); letter-spacing: 1px; text-transform: uppercase; }
  .pipe-step .p-sub  { font-size: 0.6rem; color: var(--muted); margin-top: 3px; }
  .pipe-arrow { color: var(--blue-dim); font-size: 1.4rem; padding: 0 6px; flex-shrink: 0; }

  .next-steps { max-width: 1200px; margin: 0 auto; background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 24px; }
  .next-steps h2 { font-family: 'Orbitron', monospace; color: var(--blue); font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 16px; }
  .step-checklist { list-style: none; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .step-checklist li { font-size: 0.73rem; color: #7a9aba; padding: 10px 12px; background: rgba(68,170,255,0.03); border: 1px solid var(--border); border-radius: 3px; display: flex; gap: 8px; align-items: flex-start; cursor: pointer; }
  .step-checklist li .check { color: var(--blue-dim); flex-shrink: 0; }
  .step-checklist li b { color: var(--text); display: block; margin-bottom: 2px; }
  .done b { text-decoration: line-through; opacity: 0.5; }
</style>
</head>
<body>

<h1>🚀 NODE GAME</h1>
<p class="subtitle">SPACE RTS · PHASER 3 · CLICK ANY MODULE TO EXPLORE</p>

<div class="grid" id="cards"></div>
<div class="detail" id="detail"></div>

<div class="pipeline">
  <div class="pipeline-title">▶ CI/CD PIPELINE — PUSH TO DEPLOY</div>
  <div class="pipeline-flow">
    <div class="pipe-step"><div class="p-icon">📝</div><div class="p-name">Write Code</div><div class="p-sub">VS Code + Live Server</div></div>
    <div class="pipe-arrow">→</div>
    <div class="pipe-step"><div class="p-icon">📤</div><div class="p-name">git push</div><div class="p-sub">to main</div></div>
    <div class="pipe-arrow">→</div>
    <div class="pipe-step"><div class="p-icon">⚙️</div><div class="p-name">GitHub Actions</div><div class="p-sub">auto-triggers</div></div>
    <div class="pipe-arrow">→</div>
    <div class="pipe-step"><div class="p-icon">✅</div><div class="p-name">Validate</div><div class="p-sub">check files exist</div></div>
    <div class="pipe-arrow">→</div>
    <div class="pipe-step"><div class="p-icon">🚀</div><div class="p-name">Deploy</div><div class="p-sub">GitHub Pages</div></div>
    <div class="pipe-arrow">→</div>
    <div class="pipe-step"><div class="p-icon">🌐</div><div class="p-name">Live URL</div><div class="p-sub">yourname.github.io/NodeGame</div></div>
  </div>
</div>

<div class="next-steps">
  <h2>⬡ ROADMAP</h2>
  <ul class="step-checklist" id="steps"></ul>
</div>

<script>
const modules = [
  {
    icon: '🎮',
    title: 'Game Scene',
    file: 'src/scenes/GameScene.js',
    lines: 662,
    desc: 'Core game loop: map rendering, input, combat, ownership, resources, unit production, flagship defeat.',
    tags: ['Combat', 'Ownership', 'Resources', 'Unit Production', 'Flagship'],
    tagTypes: ['blue','blue','blue','blue','yellow'],
    steps: [
      'Procedural spiral map with 14 planet nodes',
      'WASD/arrow camera scroll + scroll-wheel zoom',
      'Click to select stacks, preview + issue move orders',
      'handleArrival: merge friendly stacks or trigger combat',
      'resolveCombat: destroyer pre-strike → standard combat',
      '_handleStackDestroyed: flagship loss triggers game over',
      '_tickResources: food/metal/fuel collected every 3 seconds',
      '_tickUnitProduction: per-building timers spawn ships into stacks',
      'handleBuildingAdded: applies resource bonuses + starts production timers',
      'spawnStack: accepts optional composition object for ship types',
    ],
    note: 'unitProduction Map is keyed by "nodeId:buildingId" — supports multiple factories per planet.'
  },
  {
    icon: '🖥',
    title: 'UI Scene',
    file: 'src/scenes/UIScene.js',
    lines: 419,
    desc: 'HUD overlay running in parallel with GameScene. Top bar, bottom bar, tooltips, game-over screen.',
    tags: ['HUD', 'Pie Chart', 'Resource Tooltip', 'Game Over'],
    tagTypes: ['blue','blue','blue','red'],
    steps: [
      'Top-left: live pie chart of owned planet types + player name + count',
      'Top-right: unit count + food/metal/fuel icons and values',
      'Hover resource slot: scrollable per-planet breakdown tooltip',
      'Bottom-left: selected stack info (type + count)',
      'Bottom-right: event log (last 3 events, fading alpha)',
      'showGameOver(): full-screen defeat overlay',
      'updateResources() accepts breakdown array for tooltip data',
    ],
    note: 'Tooltip stays open when cursor moves from slot into tooltip area (10px buffer guard in update).'
  },
  {
    icon: '📋',
    title: 'Node Panel',
    file: 'src/scenes/NodePanel.js',
    lines: 1062,
    desc: 'Bottom panel (300px). Left: unit management with per-type split controls. Right: planet info + scrollable building cards.',
    tags: ['Unit Management', 'Buildings', 'Build Modal', 'Construction'],
    tagTypes: ['blue','blue','blue','yellow'],
    steps: [
      'Left — stack selector tabs + per-ship-type composition rows',
      '− n + controls per ship type; running split total + SPLIT & MOVE',
      '_doSplit emits splitComp object; GameScene deducts exact ship types',
      'Right — planet name, type label, resource bars with (+N) bonus annotations',
      'Building cards: scrollable, 5 per row, geometry-masked, scrollbar thumb',
      '_makeCard: constructs card with icon, name, output, zone; arc for factories',
      '_reattachOverlays: recreates construction overlays after every scroll rebuild',
      'Build Modal: 7 options in 2-row grid, costs red if unaffordable, already-built greyed out',
      'Factory cards show circular progress arc (top-right) animated by GameScene tick',
      'nodeResourcesUpdated event refreshes bars live when building completes',
    ],
    note: 'BUILDING_DEFS contains all 7 building definitions including drawIcon(), cost, produces, produceDuration.'
  },
  {
    icon: '🚀',
    title: 'Unit Class',
    file: 'src/units/Unit.js',
    lines: 203,
    desc: 'Stack container with ship composition. Badge shows dominant ship icon + total count. Exports ship icon draw functions.',
    tags: ['Composition', 'Ship Icons', 'Badge', 'Movement'],
    tagTypes: ['blue','blue','blue','yellow'],
    steps: [
      'composition: { fighter, destroyer, cruiser, dreadnaught, flagship }',
      'stackSize always derived from compositionTotal(composition)',
      'dominantType(): returns highest-tier ship present for badge icon',
      'drawShipIcon(gfx, type, cx, cy, color): draws the correct icon shape',
      'Badge: team-coloured rect with ship icon (left) + count text (right)',
      'updateBadge(): recomputes stackSize and redraws badge',
      'Exports: drawShipIcon, SHIP_TYPES, emptyComposition, compositionTotal, dominantType',
    ],
    note: 'Ship icon geometry in drawShipIcon matches factory building drawIcon() exactly for visual consistency.'
  },
  {
    icon: '🗺',
    title: 'Map Graph',
    file: 'src/map/MapGraph.js',
    lines: 240,
    desc: 'Procedural star map generator. Archimedean spiral placement, seeded planet names, BFS pathfinding.',
    tags: ['Procedural', 'Spiral Layout', 'BFS', 'Pathfinding'],
    tagTypes: ['blue','blue','blue','green'],
    steps: [
      '14 planets placed on Archimedean spiral, minimum 110px spacing',
      'Planet names built from randomised syllable combinations',
      'Each planet guaranteed at least one edge to nearest neighbour',
      'Additional edges added to nearby planets for map density',
      'BFS bridge detection ensures full connectivity',
      'findPath(from, to, adjacency): BFS shortest-path routing',
      'Exports: NODES, EDGES, buildAdjacency, findPath',
    ],
    note: 'Refresh the page to regenerate a new map. No seed parameter yet — add one for reproducible maps.'
  },
  {
    icon: '⚙',
    title: 'Game Config',
    file: 'src/main.js',
    lines: 16,
    desc: 'Phaser 3 config. 1280×720 canvas, 4 scenes in pipeline order.',
    tags: ['1280×720', 'WebGL/Canvas', '4 Scenes'],
    tagTypes: ['blue','yellow','blue'],
    steps: [
      'Imports BootScene, GameScene, UIScene, NodePanel',
      '1280×720 canvas, transparent background',
      'Scene order: Boot → Game (launches UI + NodePanel in parallel)',
      'No physics engine — movement is manual vector math in Unit.update()',
    ],
    note: 'UIScene and NodePanel are launched by GameScene.create() via this.scene.launch().'
  },
  {
    icon: '🔄',
    title: 'CI/CD Pipeline',
    file: '.github/workflows/deploy.yml',
    lines: null,
    desc: 'Auto-deploys to GitHub Pages on every push to main.',
    tags: ['GitHub Actions', 'GitHub Pages', 'Free Hosting'],
    tagTypes: ['green','green','green'],
    steps: [
      'Triggers on push to main branch',
      'Validates all key files exist',
      'Deploys to GitHub Pages',
      'Live at: yourname.github.io/NodeGame',
    ],
    note: 'Enable Pages in repo Settings → Pages → Source → GitHub Actions.'
  },
  {
    icon: '⬇',
    title: 'Boot Scene',
    file: 'src/scenes/BootScene.js',
    lines: null,
    desc: 'Asset preloader. Placeholder loading bar — no assets loaded yet (all graphics are procedural).',
    tags: ['Preloader', 'Placeholder'],
    tagTypes: ['yellow','yellow'],
    steps: [
      'Draws a loading progress bar',
      'All graphics currently drawn procedurally in-code',
      'Auto-transitions to GameScene when done',
    ],
    note: 'Uncomment load.image() calls here when you add sprite assets.'
  },
];

const nextSteps = [
  { done: true,  title: 'Node-based movement',     desc: 'Stacks travel graph edges in real-time' },
  { done: true,  title: 'Combat resolution',        desc: 'Stack combat with destroyer pre-strike' },
  { done: true,  title: 'Planet ownership',         desc: 'Rings, capture, ownership persistence' },
  { done: true,  title: 'Resource system',          desc: 'Food/metal/fuel ticks from owned planets' },
  { done: true,  title: 'Buildings + construction', desc: '7 buildings, timers, cost deduction' },
  { done: true,  title: 'Unit production',          desc: 'Factories spawn ships on timers' },
  { done: true,  title: 'Ship types + composition', desc: '5 ship types, badge icons, merge/split' },
  { done: true,  title: 'Flagship / game over',     desc: 'Lose when flagship is destroyed' },
  { done: false, title: 'Cruiser ability',          desc: 'Define and implement cruiser special role' },
  { done: false, title: 'Dreadnaught ability',      desc: 'Define and implement dreadnaught special role' },
  { done: false, title: 'Planet upgrading',         desc: 'Click planet card to upgrade outpost level' },
  { done: false, title: 'Enemy AI',                 desc: 'Basic AI: expand, build, attack' },
  { done: false, title: 'Win condition',            desc: 'Destroy enemy flagship or capture all planets' },
  { done: false, title: 'Sound effects',            desc: 'Combat, production, capture audio cues' },
  { done: false, title: 'Multiplayer / persistence',desc: 'Supabase backend for save games or online play' },
];

let activeIdx = null;
const cardsEl  = document.getElementById('cards');
const detailEl = document.getElementById('detail');

modules.forEach((m, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <span class="icon">${m.icon}</span>
      <span class="card-title">${m.title}</span>
    </div>
    <div class="card-file">${m.file}</div>
    ${m.lines ? `<div class="card-lines">${m.lines} lines</div>` : ''}
    <div class="card-desc">${m.desc}</div>
  `;
  card.addEventListener('click', () => {
    if (activeIdx === i) {
      activeIdx = null;
      detailEl.classList.remove('show');
      card.classList.remove('active');
      return;
    }
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    activeIdx = i;

    const tags  = m.tags.map((t, ti) => `<span class="tag ${m.tagTypes[ti]}">${t}</span>`).join('');
    const steps = m.steps.map((s, si) => `<li><span class="num">${si+1}.</span>${s}</li>`).join('');
    detailEl.innerHTML = `
      <div class="detail-title">${m.icon} ${m.title.toUpperCase()} — ${m.file}</div>
      <div class="detail-grid">
        <div class="detail-section">
          <h3>What it does</h3>
          <ul class="step-list">${steps}</ul>
        </div>
        <div class="detail-section">
          <h3>Tags</h3>
          <div class="tag-list" style="margin-bottom:16px">${tags}</div>
          <h3>Dev note</h3>
          <p style="font-size:0.75rem;color:#7a9aba;line-height:1.6">${m.note}</p>
        </div>
      </div>
    `;
    detailEl.classList.add('show');
    detailEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
  cardsEl.appendChild(card);
});

const stepsEl = document.getElementById('steps');
nextSteps.forEach(s => {
  const li = document.createElement('li');
  if (s.done) li.classList.add('done');
  li.innerHTML = `<span class="check">${s.done ? '✅' : '☐'}</span><div><b>${s.title}</b>${s.desc}</div>`;
  if (!s.done) {
    li.style.cursor = 'pointer';
    li.addEventListener('click', () => {
      const isDone = li.querySelector('.check').textContent === '✅';
      li.querySelector('.check').textContent = isDone ? '☐' : '✅';
      li.classList.toggle('done', !isDone);
    });
  }
  stepsEl.appendChild(li);
});
</script>
</body>
</html>
